# ==============================================================
# Senado NUSP — CI Pipeline
# Compila backend (Java 17/Maven) e frontend (Node 22/Angular)
# Roda a cada push e pull request na branch main
# ==============================================================

name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────
  # Backend: Java 17 + Maven
  # ────────────────────────────────────────────
  backend:
    name: Backend (Java 17)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Compilar e rodar testes
        run: mvn package -q

  # ────────────────────────────────────────────
  # Frontend: Node 22 + Angular
  # ────────────────────────────────────────────
  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci --quiet

      - name: Build de produção
        run: npx ng build --configuration production
