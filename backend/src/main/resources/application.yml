server:
  port: 8000

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@//localhost:1521/XEPDB1}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        default_schema: NUSP
        format_sql: true
    show-sql: false
  mail:
    host: ${SPRING_MAIL_HOST:smtp.hostinger.com}
    port: ${SPRING_MAIL_PORT:465}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: NUSP
  jackson:
    default-property-inclusion: non_null

app:
  env:
    label: ${APP_ENV_LABEL:}
  jwt:
    secret: ${AUTH_JWT_SECRET}
    ttl-seconds: ${AUTH_JWT_TTL_SEC:5400}
    cookie-name: ${AUTH_JWT_COOKIE_NAME:sn_auth_jwt}
    cookie-domain: ${AUTH_JWT_COOKIE_DOMAIN:}
  session:
    touch-max-age-seconds: ${SESSION_TOUCH_MAX_AGE_SECONDS:5400}
  files:
    dir: ${FILES_DIR}
    url-prefix: ${FILES_URL_PREFIX:/files/}
    operadores-dirname: operadores
    tecnicos-dirname: tecnicos
  password-reset:
    token-ttl-minutes: ${PASSWORD_RESET_TTL_MIN:30}
    base-url: ${APP_BASE_URL:http://localhost:4200}
  admin:
    supervisor-username: ${ADMIN_SUPERVISOR_USERNAME}
    chefe-username: ${ADMIN_CHEFE_USERNAME}
    master-username: ${ADMIN_MASTER_USERNAME}
  sheets:
    credentials-path: ${GOOGLE_SHEETS_CREDENTIALS_PATH:/app/google-sheets-key.json}
    spreadsheet-id: ${GOOGLE_SHEETS_SPREADSHEET_ID:}
    refresh-interval-sec: ${GOOGLE_SHEETS_REFRESH_INTERVAL_SEC:60}
    cessao-colors-hex: ${GOOGLE_SHEETS_CESSAO_COLORS:FFF2CC,FCE5CD}
  metabase:
    enabled: ${METABASE_ENABLED:true}
    url: ${METABASE_URL:https://bi.senado-nusp.cloud}
    admin-email: ${METABASE_ADMIN_EMAIL:nusp-metabase@outlook.com}
    admin-password: ${METABASE_ADMIN_PASSWORD:}
    encrypt-key: ${METABASE_ENCRYPT_KEY:}
    cookie-domain: ${METABASE_COOKIE_DOMAIN:.senado-nusp.cloud}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
