# =============================================================
# Senado NUSP — Sistema Completo
# Uso: docker-compose up -d
# =============================================================

services:
  # --- Oracle 21c XE ---
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: nusp-oracle
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: SenNusp2026
    volumes:
      - oracle-xe-java-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "sqlplus", "-s", "NUSP/NuspApp2026@XEPDB1", "<<< 'SELECT 1 FROM DUAL;'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # --- Backend (Spring Boot / Java 17) ---
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: nusp-backend
    restart: unless-stopped
    depends_on:
      oracle:
        condition: service_started
    environment:
      SERVER_PORT: "8003"
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: NUSP
      SPRING_DATASOURCE_PASSWORD: NuspApp2026
      CORS_ALLOWED_ORIGINS: https://java.senado-nusp.cloud,http://localhost:4200
      FILES_DIR: /app/files
      FILES_URL_PREFIX: /files/
    volumes:
      - nusp-files:/app/files

  # --- Frontend (Angular + Nginx) ---
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: nusp-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  oracle-xe-java-data:
  nusp-files:
